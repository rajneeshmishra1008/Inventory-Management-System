<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Poppins;
background:linear-gradient(135deg,#0f172a,#111827);
}

.box{
width:320px;
padding:25px;
border-radius:15px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
color:white;
text-align:center;
}

input,select{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:8px;
}

button{
width:100%;
padding:10px;
background:#3b82f6;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}

img{
width:80px;
height:80px;
border-radius:50%;
margin-bottom:10px;
}
</style>
</head>

<body>

<div class="box">

<h2>Login</h2>

<img id="profile" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<select id="role">
<option value="user">User</option>
<option value="admin">Admin</option>
</select>

<button onclick="login()">Login</button>

</div>

<script>

function login(){

let username = document.getElementById("username").value.trim();
let password = document.getElementById("password").value.trim();
let role = document.getElementById("role").value;

let users = JSON.parse(localStorage.getItem("users")) || [];

let found = users.find(u =>
u.username === username &&
u.password === password &&
u.role === role
);

if(!found){
alert("Invalid login");
return;
}

/* SESSION */
localStorage.setItem("session","active");
localStorage.setItem("activeUser", found.username);
localStorage.setItem("activeRole", found.role);
localStorage.setItem("activeImage", found.image || "");

if(role === "admin"){
window.location = "admin-dashboard.html";
}else{
window.location = "user-dashboard.html";
}

}

</script>

</body>
</html>
