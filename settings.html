<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Professional Settings Panel</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
transition:0.3s;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
overflow-x:hidden;
position:relative;
background:#020617;
color:white;
}

/* BACKGROUND */

body::before{
content:"";
position:absolute;
width:500px;
height:500px;
background:linear-gradient(#2563eb,#06b6d4);
border-radius:50%;
top:-180px;
left:-180px;
filter:blur(120px);
opacity:0.5;
animation:move1 8s infinite alternate;
}

body::after{
content:"";
position:absolute;
width:500px;
height:500px;
background:linear-gradient(#7c3aed,#ec4899);
border-radius:50%;
bottom:-180px;
right:-180px;
filter:blur(120px);
opacity:0.5;
animation:move2 8s infinite alternate;
}

@keyframes move1{
100%{
transform:translate(60px,50px);
}
}

@keyframes move2{
100%{
transform:translate(-60px,-50px);
}
}

/* CARD */

.card{
position:relative;
z-index:10;
width:100%;
max-width:550px;
padding:30px;
border-radius:30px;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.1);
backdrop-filter:blur(18px);
box-shadow:0 20px 50px rgba(0,0,0,0.5);
}

/* BACK BUTTON */

.back{
position:absolute;
top:20px;
left:20px;
padding:10px 15px;
border-radius:12px;
background:rgba(255,255,255,0.1);
border:1px solid rgba(255,255,255,0.1);
color:white;
text-decoration:none;
font-weight:600;
z-index:20;
}

.back:hover{
background:white;
color:black;
}

/* HEADER */

.header{
text-align:center;
margin-bottom:25px;
}

.header h2{
font-size:34px;
font-weight:700;
margin-bottom:8px;
}

.header p{
font-size:14px;
color:#cbd5e1;
}

/* PROFILE */

.profile{
display:flex;
align-items:center;
gap:18px;
padding:18px;
border-radius:20px;
background:rgba(255,255,255,0.08);
margin-bottom:20px;
flex-wrap:wrap;
}

.profile img{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
border:3px solid #60a5fa;
background:white;
}

.profile-info{
flex:1;
}

.profile-info h3{
font-size:22px;
margin-bottom:5px;
}

.profile-info p{
font-size:14px;
color:#cbd5e1;
}

.upload-btn{
padding:10px 15px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
cursor:pointer;
font-size:14px;
}

.upload-btn:hover{
background:#1d4ed8;
}

.profile input{
display:none;
}

/* SECTION */

.section{
padding:18px;
border-radius:20px;
background:rgba(255,255,255,0.08);
margin-bottom:18px;
}

.section h4{
margin-bottom:15px;
font-size:18px;
}

/* INFO */

.info{
display:flex;
justify-content:space-between;
margin-bottom:12px;
font-size:14px;
gap:10px;
}

.info span:last-child{
font-weight:600;
}

/* INPUT */

.input-box{
width:100%;
padding:12px;
border:none;
outline:none;
border-radius:12px;
margin-top:10px;
background:rgba(255,255,255,0.12);
color:white;
font-size:14px;
}

.input-box::placeholder{
color:#ddd;
}

/* SWITCH */

.toggle-box{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 0;
}

.switch{
position:relative;
display:inline-block;
width:55px;
height:28px;
}

.switch input{
opacity:0;
width:0;
height:0;
}

.slider{
position:absolute;
cursor:pointer;
top:0;
left:0;
right:0;
bottom:0;
background:#64748b;
border-radius:30px;
}

.slider:before{
position:absolute;
content:"";
height:22px;
width:22px;
left:3px;
bottom:3px;
background:white;
border-radius:50%;
transition:0.4s;
}

input:checked + .slider{
background:#2563eb;
}

input:checked + .slider:before{
transform:translateX(26px);
}

/* BUTTONS */

button{
width:100%;
padding:14px;
border:none;
border-radius:14px;
font-size:15px;
font-weight:600;
cursor:pointer;
margin-top:12px;
transition:0.4s;
}

.primary-btn{
background:linear-gradient(90deg,#2563eb,#7c3aed);
color:white;
}

.secondary-btn{
background:#0f172a;
color:white;
border:1px solid rgba(255,255,255,0.1);
}

.danger-btn{
background:linear-gradient(90deg,#ef4444,#dc2626);
color:white;
}

.success-btn{
background:linear-gradient(90deg,#22c55e,#16a34a);
color:white;
}

button:hover{
transform:translateY(-3px);
box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

/* MESSAGE */

.message{
margin-top:15px;
padding:12px;
border-radius:12px;
text-align:center;
font-size:14px;
display:none;
}

.success{
background:rgba(34,197,94,0.2);
border:1px solid rgba(34,197,94,0.4);
}

.error{
background:rgba(239,68,68,0.2);
border:1px solid rgba(239,68,68,0.4);
}

/* DARK MODE */

body.dark{
background:#000;
}

/* RESPONSIVE */

@media(max-width:600px){

.card{
padding:22px;
border-radius:22px;
}

.profile{
flex-direction:column;
text-align:center;
}

.header h2{
font-size:28px;
}

.profile img{
width:75px;
height:75px;
}

button{
padding:12px;
font-size:14px;
}

.back{
top:10px;
left:10px;
padding:8px 12px;
font-size:14px;
}

.info{
flex-direction:column;
}

}

</style>

</head>

<body>

<a href="dashboard.html" class="back">
⬅ Back
</a>

<div class="card">

<!-- HEADER -->

<div class="header">

<h2>⚙ Settings Panel</h2>

<p>
Manage account settings and preferences
</p>

</div>

<!-- PROFILE -->

<div class="profile">

<img
id="profileImage"
src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
>

<div class="profile-info">

<h3 id="username">
Admin User
</h3>

<p id="roleText">
Inventory User
</p>

</div>

<label class="upload-btn">

📷 Upload

<input
type="file"
accept="image/*"
onchange="changeProfile(event)"
>

</label>

</div>

<!-- ACCOUNT -->

<div class="section">

<h4>👤 Account Information</h4>

<div class="info">
<span>Username</span>
<span id="accountName">User</span>
</div>

<div class="info">
<span>Role</span>
<span id="accountRole">User</span>
</div>

<div class="info">
<span>Status</span>
<span style="color:#4ade80;">
Active
</span>
</div>

</div>

<!-- CHANGE PASSWORD -->

<div class="section">

<h4>🔑 Change Password</h4>

<input
type="password"
id="newPassword"
class="input-box"
placeholder="Enter New Password"
>

<button
class="primary-btn"
onclick="changePassword()"
>
Update Password
</button>

</div>

<!-- THEME -->

<div class="section">

<h4>🌗 Appearance</h4>

<div class="toggle-box">

<span>Enable Dark Mode</span>

<label class="switch">

<input
type="checkbox"
id="themeToggle"
onchange="toggleTheme()"
>

<span class="slider"></span>

</label>

</div>

<button
class="secondary-btn"
onclick="resetTheme()"
>

Reset Theme

</button>

</div>

<!-- SECURITY -->

<div class="section">

<h4>🔒 Security</h4>

<button
class="success-btn"
onclick="enable2FA()"
>
Enable 2FA
</button>

<button
class="secondary-btn"
onclick="viewLoginLogs()"
>
View Login Logs
</button>

</div>

<!-- ACTIONS -->

<div class="section">

<h4>⚡ Quick Actions</h4>

<button
class="danger-btn"
onclick="clearData()"
>

Clear Local Data

</button>

<button
class="danger-btn"
onclick="logout()"
>

Logout Account

</button>

</div>

<!-- MESSAGE -->

<div
id="message"
class="message"
></div>

</div>

<script>

/* =========================
LOAD DATA
========================= */

window.onload = function(){

let activeUser =
localStorage.getItem("activeUser");

document.getElementById("username").innerText =
activeUser || "Admin User";

document.getElementById("accountName").innerText =
activeUser || "User";

let role =
localStorage.getItem("activeRole");

if(role === "admin"){

document.getElementById("roleText").innerText =
"Administrator Account";

document.getElementById("accountRole").innerText =
"Admin";

}else{

document.getElementById("roleText").innerText =
"Inventory User";

document.getElementById("accountRole").innerText =
"User";

}

/* PROFILE IMAGE */

let savedImage =
localStorage.getItem("profileImage");

if(savedImage){

document.getElementById("profileImage").src =
savedImage;

}

/* THEME */

if(localStorage.getItem("theme")==="dark"){

document.body.classList.add("dark");

document.getElementById("themeToggle").checked =
true;

}

}

/* =========================
SHOW MESSAGE
========================= */

function showMessage(text,type){

let msg =
document.getElementById("message");

msg.innerText = text;

msg.className =
"message " + type;

msg.style.display = "block";

setTimeout(()=>{

msg.style.display = "none";

},3000);

}

/* =========================
CHANGE PROFILE
========================= */

function changeProfile(event){

let reader =
new FileReader();

reader.onload = function(){

document.getElementById(
"profileImage"
).src = reader.result;

localStorage.setItem(
"profileImage",
reader.result
);

showMessage(
"Profile updated successfully",
"success"
);

}

reader.readAsDataURL(
event.target.files[0]
);

}

/* =========================
CHANGE PASSWORD
========================= */

function changePassword(){

let pass =
document.getElementById(
"newPassword"
).value;

if(pass.length < 4){

showMessage(
"Password too short",
"error"
);

return;

}

localStorage.setItem(
"pass",
pass
);

document.getElementById(
"newPassword"
).value = "";

showMessage(
"Password updated successfully",
"success"
);

}

/* =========================
THEME
========================= */

function toggleTheme(){

document.body.classList.toggle("dark");

if(document.body.classList.contains("dark")){

localStorage.setItem(
"theme",
"dark"
);

}else{

localStorage.setItem(
"theme",
"light"
);

}

}

function resetTheme(){

document.body.classList.remove("dark");

localStorage.setItem(
"theme",
"light"
);

document.getElementById(
"themeToggle"
).checked = false;

showMessage(
"Theme reset successfully",
"success"
);

}

/* =========================
2FA
========================= */

function enable2FA(){

showMessage(
"Two Factor Authentication Enabled",
"success"
);

}

/* =========================
VIEW LOGS
========================= */

function viewLoginLogs(){

let logs =
JSON.parse(
localStorage.getItem("logs")
) || [];

if(logs.length===0){

showMessage(
"No logs found",
"error"
);

return;

}

let text = "";

logs.forEach(log=>{

text +=
log.time +
" - " +
log.title +
"\n";

});

alert(text);

}

/* =========================
CLEAR DATA
========================= */

function clearData(){

if(confirm(
"Clear all local data?"
)){

localStorage.clear();

showMessage(
"All data cleared",
"success"
);

setTimeout(()=>{

location.reload();

},1000);

}

}

/* =========================
LOGOUT
========================= */

function logout(){

localStorage.removeItem(
"session"
);

showMessage(
"Logged out successfully",
"success"
);

setTimeout(()=>{

window.location =
"login.html";

},1000);

}

</script>

</body>

</html>
